# Cloudflare Pages config (for documentation / wrangler local dev)
# Catatan: untuk Cloudflare Pages, AI binding diset via dashboard
# (Settings > Functions > Bindings > Add binding > Workers AI > variable name "AI")

name = "mario-ai-chatbot"
compatibility_date = "2024-12-01"
pages_build_output_dir = "."

[ai]
binding = "AI"

# Untuk local dev:
# npx wrangler pages dev . --ai AI
